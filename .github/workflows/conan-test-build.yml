name: Simple Conan + MinGW Test

on:
  push:
    branches: [ conan-test-build ]
  pull_request:
    branches: [ conan-test-build ]
  workflow_dispatch:  # Allow manual triggers

jobs:
  test-conan-mingw:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        path: openxilenv
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Download niXman MinGW-w64 GCC 14.2.0
      run: |
        cd D:/a/_temp/
        curl -L -o D:/a/_temp/mingw.7z https://github.com/niXman/mingw-builds-binaries/releases/download/14.2.0-rt_v12-rev2/x86_64-14.2.0-release-mcf-seh-ucrt-rt_v12-rev2.7z

    - name: Extract & add to PATH
      run: |
        7z x D:/a/_temp/mingw.7z -oD:/a/_temp/mingw -y
    
    - name: Add MinGW to PATH
      shell: bash
      run: |
        echo "D:/a/_temp/mingw/mingw64/bin" >> $GITHUB_PATH
    
    - name: Verify MinGW installation
      shell: cmd
      run: |
        gcc --version
        g++ --version
        cmake --version
        ninja --version
        where gcc
        where g++
        where cmake
        where ninja
    
    - name: Check out qt/qtbase@6.9
      uses: actions/checkout@v4
      with:
        repository: qt/qtbase
        ref: 6.9            # branch/tag/sha
        submodules: recursive  # qtbase uses nested 3rdparty; keep this if you need them
        show-progress: true
        lfs: true
        path: qtbase

    - name: List directories
      shell: cmd
      run: |
        cd D:\a\openxilenv\openxilenv
        dir

    - name: Prepare Qt Build
      shell: cmd 
      run: |
        cd D:\a\openxilenv\openxilenv
        mkdir qtbase-build
        cd qtbase-build
        ..\qtbase\configure.bat -debug-and-release -opensource -confirm-license -sql-sqlite -sqlite qt -prefix D:\a\Qt6.9

    - name: Build Qt
      shell: cmd 
      run: |
        cd D:\a\openxilenv\openxilenv\qtbase-build
        cmake --build . --parallel

    - name: Install Qt (Release)
      shell: cmd
      run: |
        cd D:\a\openxilenv\openxilenv\qtbase-build
        cmake --install . --config Release

    - name: Prepare OpenXilEnv Build
      shell: cmd 
      run: |
        cd D:\a\openxilenv\openxilenv
        mkdir openxilenv-build
        cd openxilenv-build
        cmake -G Ninja -DCMAKE_INSTALL_PREFIX=D:\a\OpenXilEnv ..\openxilenv

    - name: Build OpenXilEnv
      shell: cmd 
      run: |
        cd D:\a\openxilenv\openxilenv\openxilenv-build
        cmake --build .

    - name: Install OpenXilEnv 
      shell: cmd
      run: |
        cd D:\a\openxilenv\openxilenv\openxilenv-build
        cmake --install .

    - name: Deploy Qt DLLs with windeployqt
      shell: pwsh
      run: |
        cd D:\a\OpenXilEnv
        & "D:\a\Qt6.9\bin\windeployqt.exe" XilEnvGui.exe

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: OpenXilEnv-Windows-Qt6.9-MinGW14.2
        path: D:/a/OpenXilEnv/**
