name: Simple Conan + MinGW Test

on:
  push:
    branches: [ conan-test-build ]
  pull_request:
    branches: [ conan-test-build ]
  workflow_dispatch:  # Allow manual triggers

jobs:
  test-conan-mingw:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        path: openxilenv
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Download niXman MinGW-w64 GCC 14.2.0
      run: |
        cd D:/a/_temp/
        curl -L -o D:/a/_temp/mingw.7z https://github.com/niXman/mingw-builds-binaries/releases/download/14.2.0-rt_v12-rev2/x86_64-14.2.0-release-mcf-seh-ucrt-rt_v12-rev2.7z

    - name: Extract & add to PATH
      run: |
        7z x D:/a/_temp/mingw.7z -oD:/a/_temp/mingw -y
    
    - name: Add MinGW to PATH
      shell: bash
      run: |
        echo "D:/a/_temp/mingw/mingw64/bin" >> $GITHUB_PATH
    
    - name: Verify MinGW installation
      shell: cmd
      run: |
        gcc --version
        g++ --version
        cmake --version
        ninja --version
        where gcc
        where g++
        where cmake
        where ninja
    
    - name: Check out qt/qtbase@6.9
      uses: actions/checkout@v4
      with:
        repository: qt/qtbase
        ref: 6.9            # branch/tag/sha
        fetch-depth: 1      # set 0 if you need full history
        submodules: recursive  # qtbase uses nested 3rdparty; keep this if you need them
        lfs: false
        path: qtbase

    - name: List directories
      shell: cmd
      run: |
        echo Current workspace: %GITHUB_WORKSPACE%
        dir %GITHUB_WORKSPACE%
