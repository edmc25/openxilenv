name: Simple Conan + MinGW Test

on:
  push:
    branches: [ conan-test-build ]
  pull_request:
    branches: [ conan-test-build ]
  workflow_dispatch:  # Allow manual triggers

jobs:
  test-conan-mingw:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Download niXman MinGW-w64 GCC 14.2.0
      run: |
        cd D:/a/_temp/
        curl -L -o D:/a/_temp/mingw.7z https://github.com/niXman/mingw-builds-binaries/releases/download/14.2.0-rt_v12-rev2/x86_64-14.2.0-release-mcf-seh-ucrt-rt_v12-rev2.7z

    - name: Extract & add to PATH
      run: |
        7z x D:/a/_temp/mingw.7z -oD:/a/_temp/mingw -y
    
    - name: Add MinGW to PATH
      shell: bash
      run: |
        echo "D:/a/_temp/mingw/mingw64/bin" >> $GITHUB_PATH
    
    - name: Verify MinGW installation
      shell: cmd
      run: |
        gcc --version
        g++ --version
        cmake --version
        ninja --version
        where gcc
        where g++
        where cmake
        where ninja
    
    - name: Install Conan
      shell: cmd
      run: |
        python -m pip install --upgrade pip
        pip install "conan>=2.0,<3.0"
    
    - name: Verify Conan installation
      shell: cmd
      run: |
        conan --version
    
    - name: Run build test 
      shell: cmd
      run: |
        conan profile detect --force
        conan install . -pr:h=./conan_profiles/mingw14_claude --build=libpq/15.4
    
    - name: Test Conan info
      shell: cmd
      run: |
        conan graph info . -pr:h=../conan_profiles/mingw14_claude -pr:b=../conan_profiles/buildtools
    
    - name: Display success message
      shell: cmd
      run: |
        echo.
        echo ================================
        echo SUCCESS: Conan + MinGW working!
        echo ================================
        echo MinGW version: 
        gcc --version | findstr gcc
        echo Conan version:
        conan --version
        echo Test program output above shows zlib integration works
        echo.
