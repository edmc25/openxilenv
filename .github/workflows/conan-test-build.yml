name: Simple Conan + MinGW Test

on:
  push:
    branches: [ conan-test-build ]
  pull_request:
    branches: [ conan-test-build ]
  workflow_dispatch:  # Allow manual triggers

jobs:
  test-conan-mingw:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Setup MinGW
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-ninja
    
    - name: Add MinGW to PATH
      shell: bash
      run: |
        echo "D:/a/_temp/msys64/mingw64/bin" >> $GITHUB_PATH
        echo "D:/a/_temp/msys64/usr/bin" >> $GITHUB_PATH
    
    - name: Verify MinGW installation
      shell: cmd
      run: |
        gcc --version
        g++ --version
        cmake --version
        ninja --version
        where gcc
        where g++
        where cmake
        where ninja
    
    - name: Install Conan
      shell: cmd
      run: |
        python -m pip install --upgrade pip
        pip install "conan>=2.0,<3.0"
    
    - name: Verify Conan installation
      shell: cmd
      run: |
        conan --version
    
    - name: Run build batch 
      shell: cmd
      run: |
        call build_openxilenv.bat
    
    - name: Test Conan info
      shell: cmd
      run: |
        conan graph info . -pr:h=../conan_profiles/mingw14_claude -pr:b=../conan_profiles/buildtools
    
    - name: Display success message
      shell: cmd
      run: |
        echo.
        echo ================================
        echo SUCCESS: Conan + MinGW working!
        echo ================================
        echo MinGW version: 
        gcc --version | findstr gcc
        echo Conan version:
        conan --version
        echo Test program output above shows zlib integration works
        echo.
