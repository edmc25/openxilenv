name: Build OpenXilEnv (Windows, pinned deps via aqt)

on:
  push:
    branches: [ test-build ]
  pull_request:
    branches: [ test-build ]

jobs:
  build:
    runs-on: windows-latest

    env:
      QT_VERSION: 6.7.2              # README range: 5.12.9 … 6.7.2
      QT_ROOT: C:\Qt                 # aqt target directory

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Python for aqt
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install aqtinstall
        run: pip install aqtinstall

      # Discover modules/tools so we don’t request non-existent ids
      - name: Discover Qt modules & MinGW tool (via aqt)
        shell: pwsh
        run: |
          # Check available modules for Qt $env:QT_VERSION win64_mingw
          $mods = aqt list-qt windows desktop --modules $env:QT_VERSION win64_mingw 2>$null
          if ($LASTEXITCODE -ne 0) { $mods = "" }
          $hasQtTools = $mods -match '(^|[\s,])qttools($|[\s,])'
          if ($hasQtTools) {
            "AQT_QT_MODULES=qttools" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          } else {
            "AQT_QT_MODULES=" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            Write-Host "qttools not advertised for $env:QT_VERSION win64_mingw; will install Qt without it."
          }

          # Find MinGW 11.2 tool (mingw1120_64) published by mirror
          $tools = aqt list-tool windows desktop 2>$null
          if ($LASTEXITCODE -ne 0) { throw "Could not list aqt tools." }
          $mingwLine = $tools | Select-String -Pattern 'tools_mingw.*mingw1120_64' | Select-Object -First 1
          if (-not $mingwLine) { throw "No MinGW 11.2 (mingw1120_64) tool advertised by aqt mirror." }
          $toolId = ($mingwLine.ToString() -split '\s+') | Where-Object { $_ -like 'tools_mingw*' } | Select-Object -First 1
          if (-not $toolId) { throw "Could not parse tools_mingw id from: $mingwLine" }
          "AQT_MINGW_TOOL=$toolId" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Selected MinGW tool: $toolId"

      - name: Install Qt ${{ env.QT_VERSION }} (win64_mingw) & MinGW 11.2
        shell: pwsh
        run: |
          if ("$env:AQT_QT_MODULES") {
            aqt install-qt windows desktop $env:QT_VERSION win64_mingw -O $env:QT_ROOT -m $env:AQT_QT_MODULES
          } else {
            aqt install-qt windows desktop $env:QT_VERSION win64_mingw -O $env:QT_ROOT
          }
          aqt install-tool windows desktop $env:AQT_MINGW_TOOL -O "$env:QT_ROOT\Tools"

      - name: Set PATH for Qt/MinGW
        shell: pwsh
        run: |
          $qtBin    = "$env:QT_ROOT\$env:QT_VERSION\mingw_64\bin"
          $mingwBin = Get-ChildItem "$env:QT_ROOT\Tools" -Recurse -Directory -Filter "mingw1120_64" -ErrorAction SilentlyContinue |
                      ForEach-Object { Join-Path $_.FullName "bin" } | Select-Object -First 1
          if (-not $mingwBin) { throw "mingw1120_64\bin not found under $env:QT_ROOT\Tools" }
          $qtCreatorBin = Get-ChildItem "$env:QT_ROOT\Tools" -Recurse -Directory -Filter "QtCreator" -ErrorAction SilentlyContinue |
                          ForEach-Object { Join-Path $_.FullName "bin" } | Select-Object -First 1

          $qtBin, $mingwBin, $qtCreatorBin | Where-Object { $_ } | ForEach-Object {
            echo $_ | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }

          "QT_BIN=$qtBin"       | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "MINGW_BIN=$mingwBin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          if ($qtCreatorBin) { "QT_CREATOR_BIN=$qtCreatorBin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append }

      # Strawberry Perl (required by README on Windows)
      - name: Install Strawberry Perl
        run: choco install -y strawberryperl

      # Optional deps pinned by README: pugixml 1.11 and FMI 2.0.4 / 3.0.1
      - name: Fetch pugixml 1.11 and FMI 2.0.4/3.0.1 sources
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path deps | Out-Null
          curl -L -o deps\pugixml-1.11.tar.gz https://github.com/zeux/pugixml/releases/download/v1.11/pugixml-1.11.tar.gz
          tar -xzf deps\pugixml-1.11.tar.gz -C deps

          curl -L -o deps\FMI-Standard-2.0.4.zip https://github.com/modelica/fmi-standard/releases/download/v2.0.4/FMI-Standard-2.0.4.zip
          curl -L -o deps\FMI-Standard-3.0.1.zip https://github.com/modelica/fmi-standard/releases/download/v3.0.1/FMI-Standard-3.0.1.zip
          tar -xf deps\FMI-Standard-2.0.4.zip -C deps
          tar -xf deps\FMI-Standard-3.0.1.zip -C deps

      - name: Configure (CMake, MinGW Makefiles)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build | Out-Null
          cd build
          cmake -G "MinGW Makefiles" .. `
            -DCMAKE_BUILD_TYPE=Release `
            -DBUILD_EXAMPLES=ON `
            -DCMAKE_INSTALL_PREFIX=../install_win `
            -DPUGIXML_SOURCE_PATH=${{ github.workspace }}\deps\pugixml-1.11 `
            -DFMI2_SOURCE_PATH=${{ github.workspace }}\deps\FMI-Standard-2.0.4 `
            -DFMI3_SOURCE_PATH=${{ github.workspace }}\deps\FMI-Standard-3.0.1

      - name: Build
        run: |
          cd build
          cmake --build . --config Release

      - name: Install
        run: |
          cd build
          cmake --install .

      - name: Deploy Qt runtime (best-effort)
        shell: pwsh
        run: |
          $candidates = @(
            "$env:QT_BIN\windeployqt.exe",
            "$env:QT_BIN\windeployqt6.exe",
            "$env:QT_CREATOR_BIN\windeployqt.exe",
            "$env:QT_CREATOR_BIN\windeployqt6.exe"
          ) | Where-Object { $_ -and (Test-Path $_) }

          if ($candidates.Count -gt 0) {
            $wdq = $candidates[0]
            Write-Host "Using windeployqt at: $wdq"
            cd install_win
            & "$wdq" XilEnvGui.exe
          } else {
            Write-Host "windeployqt not found; skipping deployment. Qt bin is on PATH, app should still run."
          }

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OpenXilEnv-Windows-Qt${{ env.QT_VERSION }}-MinGW112
          path: install_win/**
