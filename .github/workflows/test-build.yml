name: Build OpenXilEnv (Windows + niXman MinGW + Qt 6.9 from source, no choco)

on:
  push:
    branches: [ test-build ]
  pull_request:
    branches: [ test-build ]

jobs:
  build:
    runs-on: windows-latest

    env:
      MINGW_URL: https://github.com/niXman/mingw-builds-binaries/releases/download/14.2.0-rt_v12-rev1/x86_64-14.2.0-release-win32-seh-ucrt-rt_v12-rev1.7z
      MINGW_ROOT: C:\app\tools\mingw64
      QT_SRC: C:\Users\runneradmin\qtbase-6.9
      QT_BUILD: C:\Users\runneradmin\BuildQt6.9
      QT_PREFIX: C:\Qt\custom\6.9\mingw_64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download & extract niXman MinGW 14.2
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path C:\app\tools | Out-Null
          Invoke-WebRequest -Uri $env:MINGW_URL -OutFile C:\app\mingw.7z
          & "C:\Program Files\7-Zip\7z.exe" x C:\app\mingw.7z -oC:\app\tools -y
          $dir = Get-ChildItem C:\app\tools -Directory | Where-Object { $_.Name -like "x86_64-14.2.0-release-win32-seh-ucrt-rt_v12-rev1*" } | Select-Object -First 1
          if (-not $dir) { throw "Extracted MinGW folder not found." }
          Move-Item $dir.FullName $env:MINGW_ROOT -Force
          "$env:MINGW_ROOT\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Strawberry Perl (official MSI)
        shell: pwsh
        run: |
          $perlUrl = "https://strawberryperl.com/download/5.32.1.1/strawberry-perl-5.32.1.1-64bit.msi"
          Invoke-WebRequest -Uri $perlUrl -OutFile perl.msi
          Start-Process msiexec.exe -ArgumentList '/i', 'perl.msi', '/quiet', '/norestart' -Wait
          # Add Perl to PATH
          $perlBin = "C:\Strawberry\perl\bin"
          echo $perlBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Verify toolchain
        run: |
          gcc --version
          g++ --version
          cmake --version
          ninja --version
          perl --version

      - name: Fetch Qt 6.9 (qtbase only)
        run: |
          git clone --depth 1 --branch 6.9 https://github.com/qt/qtbase.git "%QT_SRC%"
          mkdir "%QT_BUILD%"
          mkdir "%QT_PREFIX%"

      - name: Build & install Qt 6.9 (qtbase)
        run: |
          cd "%QT_BUILD%"
          cmake -G Ninja ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_INSTALL_PREFIX="%QT_PREFIX%" ^
            -DCMAKE_C_COMPILER="%MINGW_ROOT%\bin\gcc.exe" ^
            -DCMAKE_CXX_COMPILER="%MINGW_ROOT%\bin\g++.exe" ^
            -DQT_BUILD_TOOLS=ON ^
            -DBUILD_SHARED_LIBS=ON ^
            "%QT_SRC%"
          ninja
          ninja install
          echo "%QT_PREFIX%\bin" >> %GITHUB_PATH%

      - name: Fetch pugixml 1.11 and FMI 2.0.4/3.0.1 sources
        run: |
          mkdir deps
          curl -L -o deps\pugixml-1.11.tar.gz https://github.com/zeux/pugixml/releases/download/v1.11/pugixml-1.11.tar.gz
          tar -xzf deps\pugixml-1.11.tar.gz -C deps
          curl -L -o deps\FMI-Standard-2.0.4.zip https://github.com/modelica/fmi-standard/releases/download/v2.0.4/FMI-Standard-2.0.4.zip
          curl -L -o deps\FMI-Standard-3.0.1.zip https://github.com/modelica/fmi-standard/releases/download/v3.0.1/FMI-Standard-3.0.1.zip
          tar -xf deps\FMI-Standard-2.0.4.zip -C deps
          tar -xf deps\FMI-Standard-3.0.1.zip -C deps

      - name: Configure OpenXilEnv
        run: |
          mkdir build
          cd build
          cmake -G Ninja .. ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_INSTALL_PREFIX=../install_win ^
            -DPUGIXML_SOURCE_PATH=%GITHUB_WORKSPACE%\deps\pugixml-1.11 ^
            -DFMI2_SOURCE_PATH=%GITHUB_WORKSPACE%\deps\FMI-Standard-2.0.4 ^
            -DFMI3_SOURCE_PATH=%GITHUB_WORKSPACE%\deps\FMI-Standard-3.0.1 ^
            -DCMAKE_C_COMPILER=%MINGW_ROOT%\bin\gcc.exe ^
            -DCMAKE_CXX_COMPILER=%MINGW_ROOT%\bin\g++.exe

      - name: Build OpenXilEnv
        run: |
          cd build
          ninja

      - name: Install OpenXilEnv
        run: |
          cd build
          ninja install

      - name: Package Qt runtime with app
        run: |
          mkdir install_win\qt_runtime
          robocopy "%QT_PREFIX%\bin" install_win\qt_runtime\bin /E /NFL /NDL /NJH /NJS /NC /NS
          robocopy "%QT_PREFIX%\plugins" install_win\qt_runtime\plugins /E /NFL /NDL /NJH /NJS /NC /NS
          robocopy "%QT_PREFIX%\translations" install_win\qt_runtime\translations /E /NFL /NDL /NJH /NJS /NC /NS
          robocopy "%MINGW_ROOT%\bin" install_win\qt_runtime\mingw_bin /E /NFL /NDL /NJH /NJS /NC /NS

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OpenXilEnv-Windows-Qt6.9-MinGW14.2
          path: install_win/**
